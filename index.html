<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Som Sem Nome</title>
  <link rel="icon" type="image/png" href="assets/favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── RESET & BASE ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #040d18;
      --bg2:       #071628;
      --bg3:       #0a1e38;
      --blue:      #2e7fc2;
      --blue-lit:  #5aaae8;
      --teal:      #1db97a;
      --teal-dim:  #0f6e48;
      --text:      #b5d4f4;
      --text-dim:  #4a6d94;
      --white:     #e8f4ff;
      --line:      #0d2540;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE overlay ────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── PRELOADER ────────────────────────────────── */
    #preloader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }
    #preloader.hide { opacity: 0; pointer-events: none; }

    .pre-logo {
      font-family: 'Space Mono', monospace;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--white);
    }
    .pre-logo span { color: var(--teal); }

    .pre-bar {
      margin-top: 2rem;
      width: 180px;
      height: 2px;
      background: var(--line);
      border-radius: 2px;
      overflow: hidden;
    }
    .pre-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), var(--teal));
      animation: load 1.4s ease forwards;
    }
    @keyframes load { to { width: 100%; } }

    /* ── HEADER ───────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(4, 13, 24, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 0 clamp(1rem, 4vw, 3rem);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }
    .header-logo img {
      height: 36px;
      width: 36px;
      object-fit: contain;
    }
    .header-logo-text {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--white);
      line-height: 1;
    }
    .header-logo-text span { color: var(--teal); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .btn-submit {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--bg);
      background: var(--teal);
      border: none;
      border-radius: 4px;
      padding: 0.5rem 1.1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none;
    }
    .btn-submit:hover { background: #24d68a; transform: translateY(-1px); }

    .social-links { display: flex; gap: 0.75rem; }
    .social-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }
    .social-links a:hover { color: var(--blue-lit); }

    /* ── HERO STRIP ───────────────────────────────── */
    .hero {
      padding: clamp(2.5rem, 6vw, 4rem) clamp(1rem, 4vw, 3rem) 0;
      position: relative;
    }
    .hero-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--teal);
      margin-bottom: 0.5rem;
    }
    .hero-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .hero-title em {
      font-style: normal;
      color: var(--blue-lit);
    }

    /* frequência decorativa */
    .freq-divider {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      margin: 2rem 0 1.5rem;
      height: 28px;
    }
    .freq-divider span {
      display: block;
      width: 3px;
      border-radius: 2px;
      background: var(--blue);
      opacity: 0.5;
    }
    .freq-divider span:nth-child(odd) { background: var(--teal); }

    /* ── FILTROS ──────────────────────────────────── */
    .filters {
      padding: 0 clamp(1rem, 4vw, 3rem);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .filter-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 3px;
      padding: 0.35rem 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover,
    .filter-btn.active {
      color: var(--white);
      border-color: var(--blue);
      background: rgba(46, 127, 194, 0.1);
    }

    /* ── LAYOUT PRINCIPAL ─────────────────────────── */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 2rem;
      padding: 0 clamp(1rem, 4vw, 3rem) 6rem;
    }
    @media (max-width: 860px) {
      .main-layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    /* ── GRELHA DE MÚSICAS ────────────────────────── */
    .music-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    /* CARD */
    .card {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.25s, transform 0.2s;
      position: relative;
    }
    .card:hover {
      border-color: var(--blue);
      transform: translateY(-3px);
    }
    .card:hover .card-glow { opacity: 1; }

    .card-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(46,127,194,0.08) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card-cover {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: var(--bg3);
    }

    .card-cover-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-cover-placeholder svg { opacity: 0.2; }

    .card-body { padding: 1rem; }

    .card-estilo {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--teal);
      margin-bottom: 0.35rem;
    }

    .card-titulo {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-artista {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .btn-preview {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--blue-lit);
      background: transparent;
      border: 1px solid var(--blue);
      border-radius: 3px;
      padding: 0.45rem 0;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }
    .btn-preview:hover {
      background: rgba(46,127,194,0.15);
      color: var(--white);
    }
    .btn-preview.playing {
      background: rgba(46,127,194,0.2);
      border-color: var(--blue-lit);
      color: var(--white);
    }

    .btn-download {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--bg);
      background: var(--teal);
      border: none;
      border-radius: 3px;
      padding: 0.45rem 0;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }
    .btn-download:hover { background: #24d68a; }

    /* estado vazio / loading */
    .grid-loading, .grid-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 0;
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }
    .grid-loading::after {
      content: '';
      display: block;
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--blue), var(--teal));
      margin: 1rem auto 0;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

    /* ── SIDEBAR ──────────────────────────────────── */
    .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }

    .sidebar-block {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 1.25rem;
    }

    .sidebar-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--teal);
      margin-bottom: 1rem;
    }

    /* TOP 5 EQUALIZER */
    .top5-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .top5-item {
      display: grid;
      grid-template-columns: 16px 1fr auto;
      gap: 0.6rem;
      align-items: center;
    }
    .top5-rank {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--teal);
      font-weight: 700;
    }
    .top5-info { overflow: hidden; }
    .top5-titulo {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top5-artista {
      font-size: 0.68rem;
      color: var(--text-dim);
    }
    .top5-bar-wrap {
      width: 100%;
      height: 2px;
      background: var(--line);
      border-radius: 2px;
      margin-top: 0.3rem;
      grid-column: 2 / -1;
    }
    .top5-bar {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--blue), var(--teal));
      transition: width 0.8s ease;
    }

    /* BANNER PUBLICITÁRIO */
    .ad-block {
      background: var(--bg3);
      border: 1px dashed var(--line);
      border-radius: 4px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-align: center;
    }
    .ad-block svg { opacity: 0.2; }

    /* ── PLAYER GLOBAL (rodapé) ───────────────────── */
    #global-player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(4, 13, 24, 0.97);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(16px);
      display: none;
      align-items: center;
      padding: 0 clamp(1rem, 4vw, 3rem);
      gap: 1.5rem;
      z-index: 200;
    }
    #global-player.visible { display: flex; }

    .player-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
      flex: 1;
    }
    .player-titulo {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-artista {
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .player-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--blue-lit);
      padding: 0.25rem;
      display: flex;
      align-items: center;
      transition: color 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .player-btn:hover { color: var(--white); transform: scale(1.1); }

    .player-progress-wrap {
      flex: 2;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .player-time {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .player-bar {
      flex: 1;
      height: 3px;
      background: var(--line);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }
    .player-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), var(--teal));
      border-radius: 3px;
      pointer-events: none;
    }

    /* ── SCROLLBAR ────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--blue); }
  </style>
</head>
<body>

<!-- PRELOADER -->
<div id="preloader">
  <div class="pre-logo">SOM<span>.</span></div>
  <div class="pre-logo" style="font-size:1.1rem;letter-spacing:0.3em;color:var(--text-dim);margin-top:0.25rem;">SEM NOME</div>
  <div class="pre-bar"></div>
</div>

<!-- HEADER -->
<header>
  <a class="header-logo" href="index.html">
    <img src="assets/logo.png" alt="SSN Logo" onerror="this.style.display='none'"/>
    <div class="header-logo-text">SOM<span>.</span>SEMNOME</div>
  </a>
  <div class="header-right">
    <div class="social-links">
      <a href="#" target="_blank">TIKTOK</a>
      <a href="#" target="_blank">YT</a>
    </div>
    <a href="mailto:somsemnome@gmail.com" class="btn-submit">SUBMETER MÚSICA</a>
  </div>
</header>

<!-- HERO -->
<div class="hero" style="padding-bottom:1.5rem;">
  <div class="hero-label">// ARQUIVO SONORO</div>
  <h1 class="hero-title">Música que <em>sente</em>.<br>Histórias que ficam.</h1>
  <div class="freq-divider" id="freqDivider"></div>
</div>

<!-- FILTROS -->
<div class="filters" id="filtros">
  <button class="filter-btn active" data-estilo="">TUDO</button>
</div>

<!-- LAYOUT PRINCIPAL -->
<div class="main-layout">

  <!-- GRELHA -->
  <div class="music-grid" id="musicGrid">
    <div class="grid-loading">A CARREGAR FAIXAS</div>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- TOP 5 -->
    <div class="sidebar-block">
      <div class="sidebar-label">// TOP 5 SEMANAL</div>
      <div class="top5-list" id="top5List">
        <div style="color:var(--text-dim);font-size:0.75rem;">A carregar...</div>
      </div>
    </div>

    <!-- BANNER PUBLICIDADE 1 -->
    <div class="ad-block">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M9 21V9"/>
      </svg>
      ESPAÇO PUBLICITÁRIO<br/>CONTACTE-NOS
    </div>

    <!-- BANNER PUBLICIDADE 2 -->
    <div class="ad-block" style="min-height:120px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/>
      </svg>
      BANNER LOCAL
    </div>

  </aside>
</div>

<!-- PLAYER GLOBAL -->
<div id="global-player">
  <button class="player-btn" id="playerPlayBtn" title="Play/Pausa">
    <svg id="playerPlayIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
      <polygon points="5,3 19,12 5,21"/>
    </svg>
  </button>
  <div class="player-info">
    <div class="player-titulo" id="playerTitulo">—</div>
    <div class="player-artista" id="playerArtista">—</div>
  </div>
  <div class="player-progress-wrap">
    <span class="player-time" id="playerTime">0:00</span>
    <div class="player-bar" id="playerBar">
      <div class="player-bar-fill" id="playerBarFill"></div>
    </div>
    <span class="player-time" id="playerDuration">0:00</span>
  </div>
</div>

<!-- SCRIPTS -->
<script src="js/config.js"></script>
<script src="js/player.js"></script>
<script src="js/app.js"></script>

<script>
  // Preloader
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('preloader').classList.add('hide');
    }, 1500);
  });

  // Frequência decorativa
  const freq = document.getElementById('freqDivider');
  const heights = [8,14,20,12,26,18,10,22,16,28,12,20,8,16,24,10,18,14,26,8,20,16,12,22,18];
  heights.forEach(h => {
    const s = document.createElement('span');
    s.style.height = h + 'px';
    freq.appendChild(s);
  });
</script>

</body>
</html>
